allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
}

// Fix device_apps and other outdated plugins
subprojects {
    plugins.withId("com.android.library") {
        android {
            if (namespace == null) {
                namespace = project.group ?: "com.placeholder.${project.name}"
            }
            compileSdk 36
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}